apiVersion: weka.weka.io/v1alpha1
kind: WekaClient
metadata:
  name: warp-cluster-clients
spec:
  image: quay.io/weka.io/weka-in-container:5.1.0.605
  imagePullSecret: quay-io-secret
  driversDistService: "https://drivers.weka.io"
  rawTolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  port: 45001
  agentPort: 45000
  nodeSelector:
    weka.io/supports-clients: "true"
  wekaSecretRef: weka-client-cluster-dev
  joinIpPorts: ["192.168.1.1:14000"]
  network:
    udpMode: true
