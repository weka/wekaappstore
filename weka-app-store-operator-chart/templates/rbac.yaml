{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "weka-app-store-operator-chart.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weka-app-store-operator-chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "weka-app-store-operator-chart.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "weka-app-store-operator-chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "weka-app-store-operator-chart.fullname" . }}-secret-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "weka-app-store-operator-chart.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
