{{- if .Values.customResourceDefinition.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wekaappstores.warp.io
spec:
  group: warp.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Legacy pod-based deployment (backward compatible)
              image:
                type: string
                description: "Container image for pod-based deployment (legacy)"
              binary:
                type: string
                description: "Binary command for pod-based deployment (legacy)"
              
              # Helm-based deployment configuration
              helmChart:
                type: object
                description: "Helm chart configuration for component deployment"
                properties:
                  repository:
                    type: string
                    description: "Helm chart repository URL"
                  name:
                    type: string
                    description: "Helm chart name"
                  version:
                    type: string
                    description: "Helm chart version"
                  releaseName:
                    type: string
                    description: "Custom Helm release name (optional, defaults to CR name)"
                  crdsStrategy:
                    type: string
                    description: "How to handle CRDs contained in the chart: Auto (default) skips if CRDs already exist, Install always installs CRDs, Skip never installs CRDs"
                    enum: ["Auto", "Install", "Skip"]
                    default: "Auto"
              
              # Helm values configuration
              values:
                type: object
                x-kubernetes-preserve-unknown-fields: true
                description: "Inline Helm values (YAML object)"
              
              valuesFiles:
                type: array
                description: "References to ConfigMaps or Secrets containing values files"
                items:
                  type: object
                  properties:
                    kind:
                      type: string
                      enum: ["ConfigMap", "Secret"]
                      description: "Type of resource containing values"
                    name:
                      type: string
                      description: "Name of ConfigMap or Secret"
                    key:
                      type: string
                      description: "Key within the ConfigMap or Secret containing values YAML"
                  required:
                    - kind
                    - name
                    - key
              
              # Deployment target namespace
              targetNamespace:
                type: string
                description: "Target namespace for Helm installation (optional, defaults to CR namespace)"
              
              # AppStack configuration for multi-component deployments with dependencies
              appStack:
                type: object
                description: "Multi-component application stack with dependency management"
                properties:
                  components:
                    type: array
                    description: "List of components to deploy in order with dependencies"
                    items:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          description: "Component name (unique identifier)"
                        description:
                          type: string
                          description: "Component description"
                        enabled:
                          type: boolean
                          description: "Enable or disable this component (default: true)"
                          default: true
                        dependsOn:
                          type: array
                          description: "List of component names this component depends on"
                          items:
                            type: string
                        helmChart:
                          type: object
                          description: "Helm chart configuration for this component"
                          properties:
                            repository:
                              type: string
                              description: "Helm chart repository URL"
                            name:
                              type: string
                              description: "Helm chart name"
                            version:
                              type: string
                              description: "Helm chart version"
                            releaseName:
                              type: string
                              description: "Custom Helm release name (optional, defaults to component name)"
                            crdsStrategy:
                              type: string
                              description: "How to handle CRDs contained in the chart: Auto (default) skips if CRDs already exist, Install always installs CRDs, Skip never installs CRDs"
                              enum: ["Auto", "Install", "Skip"]
                              default: "Auto"
                        kubernetesManifest:
                          type: string
                          description: "Raw Kubernetes YAML manifest (alternative to Helm chart)"
                        values:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                          description: "Inline Helm values for this component"
                        valuesFiles:
                          type: array
                          description: "References to ConfigMaps or Secrets containing values files"
                          items:
                            type: object
                            properties:
                              kind:
                                type: string
                                enum: ["ConfigMap", "Secret"]
                                description: "Type of resource containing values"
                              name:
                                type: string
                                description: "Name of ConfigMap or Secret"
                              key:
                                type: string
                                description: "Key within the ConfigMap or Secret containing values YAML"
                            required:
                              - kind
                              - name
                              - key
                        targetNamespace:
                          type: string
                          description: "Target namespace for this component (optional)"
                        waitForReady:
                          type: boolean
                          description: "Wait for component to be ready before proceeding (default: true)"
                          default: true
                        readinessCheck:
                          type: object
                          description: "Custom readiness check configuration"
                          properties:
                            type:
                              type: string
                              enum: ["pod", "deployment", "statefulset", "job", "custom", "crd"]
                              description: "Type of readiness check"
                            name:
                              type: string
                              description: "Optional resource name to wait on (e.g., a specific deployment name). If set, selector/matchLabels are ignored."
                            selector:
                              type: string
                              description: "Label selector for readiness (kubectl-style). For multiple conditions, separate with commas (e.g., 'app.kubernetes.io/instance=prometheus-adapter,app.kubernetes.io/name=prometheus-adapter'). Use matchLabels for map-style."
                            matchLabels:
                              type: object
                              description: "Kubernetes-style matchLabels map (alternative to selector)"
                              additionalProperties:
                                type: string
                            namespace:
                              type: string
                              description: "Optional namespace override for the readiness check (defaults to component/CR namespace)"
                            timeout:
                              type: integer
                              description: "Timeout in seconds (default: 300)"
                              default: 300
                  variables:
                    type: object
                    description: |
                      Map of variable name → string value. Substituted as ${VAR} into:
                        - kubernetesManifest strings
                        - The raw content of ConfigMap/Secret referenced by valuesFiles
                      The variable ${namespace} auto-defaults to the CR's metadata.namespace
                      if not explicitly set. Use $$ to escape a literal dollar sign.
                      Undefined references raise a permanent error.
                      Variable names must match Python identifier syntax: [_a-zA-Z][_a-zA-Z0-9]*.
                    additionalProperties:
                      type: string
          
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
              releaseStatus:
                type: string
                description: "Status of the Helm release (single component deployments)"
              releaseName:
                type: string
                description: "Name of the Helm release (single component deployments)"
              releaseVersion:
                type: integer
                description: "Version/revision of the Helm release (single component deployments)"
              
              # AppStack-specific status
              componentStatus:
                type: array
                description: "Status of individual components in AppStack"
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Component name"
                    phase:
                      type: string
                      description: "Current phase: Pending, Installing, Ready, Failed"
                      enum: ["Pending", "Installing", "Ready", "Failed", "Disabled"]
                    releaseName:
                      type: string
                      description: "Helm release name for this component"
                    releaseVersion:
                      type: integer
                      description: "Helm release version/revision"
                    message:
                      type: string
                      description: "Status message"
                    lastTransitionTime:
                      type: string
                      format: date-time
                      description: "Last time the status changed"
              appStackPhase:
                type: string
                description: "Overall AppStack deployment phase"
                enum: ["Pending", "Installing", "Ready", "Failed", "Degraded"]

  names:
    kind: WekaAppStore
    plural: wekaappstores
  scope: Namespaced
{{- end }}
---
{{- if .Values.customResourceDefinition.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: warpcredentials.warp.io
spec:
  group: warp.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: "Desired state of the WarpCredential. The operator reads this to determine which secrets to derive."
            required:
              - type
              - displayName
              - secretRef
            properties:
              type:
                type: string
                description: "Credential type. Determines which derived secrets the operator creates. Valid values: nvidia-ngc, huggingface, weka-storage."
                enum:
                  - nvidia-ngc
                  - huggingface
                  - weka-storage
              displayName:
                type: string
                description: "Human-readable label shown in the GUI and blueprint install dropdowns. Unique within a namespace is recommended but not enforced at the CRD level."
              secretRef:
                type: object
                description: "Reference to the Kubernetes Secret that holds the raw credential value. The operator reads the key from this Secret to derive child secrets."
                required:
                  - name
                  - key
                properties:
                  name:
                    type: string
                    description: "Name of the Kubernetes Secret in the App Store namespace that contains the raw credential value."
                  key:
                    type: string
                    description: "Key within the referenced Secret whose value is the raw credential (API token, docker password, etc.)."
              endpoint:
                type: string
                description: "Base URL of the WEKA management REST API (e.g. https://weka-cluster:14000). Used only for weka-storage credentials; silently ignored for nvidia-ngc and huggingface."
          status:
            type: object
            description: "Observed state populated by the operator after reconciliation. Do not set manually."
            properties:
              conditions:
                type: array
                description: "Standard Kubernetes condition list. Condition types: KeyReady (all types), DockerSecretReady (nvidia-ngc only)."
                items:
                  type: object
                  required:
                    - type
                    - status
                  properties:
                    type:
                      type: string
                      description: "Condition type identifier (e.g. KeyReady, DockerSecretReady)."
                    status:
                      type: string
                      description: "Condition status: True, False, or Unknown."
                      enum:
                        - "True"
                        - "False"
                        - "Unknown"
                    reason:
                      type: string
                      description: "Machine-readable reason code (e.g. KeyPresent, KeyMissing, DerivationFailed)."
                    message:
                      type: string
                      description: "Human-readable message describing the current condition state."
                    lastTransitionTime:
                      type: string
                      format: date-time
                      description: "Timestamp of the last condition state transition."
              derivedSecrets:
                type: array
                description: "List of Kubernetes Secrets created or maintained by the operator as a result of this credential. Blueprint install logic uses these names when copying secrets to target namespaces."
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "metadata.name of the derived Kubernetes Secret (e.g. warp-ngc-production-docker)."
                    type:
                      type: string
                      description: "Kubernetes Secret type of the derived secret (e.g. Opaque or kubernetes.io/dockerconfigjson)."
              lastSyncTime:
                type: string
                format: date-time
                description: "Timestamp of the most recent successful reconciliation that created or verified all derived secrets."
              wekaEndpoint:
                type: string
                description: "Populated for weka-storage credentials only. Mirrors spec.endpoint so the API can return the endpoint URL without reading the underlying Secret."
  names:
    kind: WarpCredential
    plural: warpcredentials
  scope: Namespaced
{{- end }}