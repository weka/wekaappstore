# Replace placeholder values before applying.
# Use: kubectl create secret generic openclaw-token --from-literal=token=YOUR_TOKEN -n NAMESPACE
# Use: kubectl create secret generic nvidia-api-key --from-literal=key=YOUR_NVIDIA_API_KEY -n NAMESPACE
#
# Alternatively, base64-encode your values and replace the placeholders below:
#   echo -n "YOUR_TOKEN" | base64
#   echo -n "YOUR_NVIDIA_API_KEY" | base64
# Then apply with: kubectl apply -f openclaw-secrets.yaml -n NAMESPACE
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-token
  # No namespace hardcoded — apply with: kubectl apply -f openclaw-secrets.yaml -n <NAMESPACE>
type: Opaque
data:
  token: <base64-encoded-gateway-token>
---
apiVersion: v1
kind: Secret
metadata:
  name: nvidia-api-key
  # No namespace hardcoded — apply with: kubectl apply -f openclaw-secrets.yaml -n <NAMESPACE>
type: Opaque
data:
  key: <base64-encoded-nvidia-api-key>
