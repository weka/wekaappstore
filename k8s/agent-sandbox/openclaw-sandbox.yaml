# Source: kubernetes-sigs/agent-sandbox/examples/openclaw-sandbox/
# Sandbox CR for deploying OpenClaw via the agent-sandbox CRD operator (v0.2.1)
# Phase 13: MCP sidecar wiring added — init container, weka-mcp-sidecar, git-sync, volumes
# Apply with: kubectl apply -f openclaw-sandbox.yaml -n <NAMESPACE>
# Requires:
#   - openclaw-secrets.yaml applied first (creates openclaw-token and nvidia-api-key Secrets)
#   - mcp-rbac.yaml applied first (creates weka-mcp-server-sa ServiceAccount and RBAC)
#   - mcp-skill-configmap.yaml applied first (creates weka-mcp-skill-md ConfigMap)
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: openclaw-sandbox
  # No namespace hardcoded — apply with: kubectl apply -f openclaw-sandbox.yaml -n <NAMESPACE>
spec:
  podTemplate:
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      # K8S-02: ServiceAccount grants MCP sidecar the RBAC permissions defined in mcp-rbac.yaml
      # (list/get Secrets, create/patch WekaAppStore CRDs, etc.)
      serviceAccountName: weka-mcp-server-sa
      # ─── Init Container ───────────────────────────────────────────────────────
      # K8S-05: Init container runs before any regular container starts.
      # Writes openclaw.json into the shared openclaw-config emptyDir so OpenClaw
      # discovers the MCP sidecar at pod startup. Uses printf (not heredoc) to
      # avoid shell variable expansion pitfalls when writing JSON.
      #
      # Schema: OpenClaw 2026.3.23 uses mcp.servers.<name> nested format.
      # The top-level flat schema (name/description/transport/url/skill) is rejected
      # by openclaw config validate — discovered by live cluster testing in Phase 13-03.
      # Correct keys: mcp.servers.<name>.url, .transport, .skill
      initContainers:
        - name: openclaw-json-generator
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              printf '{"gateway":{"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true}},"models":{"providers":{"nim":{"baseUrl":"%s","api":"openai-completions","apiKey":"not-needed","models":[{"id":"%s","name":"Local NIM Llama 3.1 8B","reasoning":false,"input":["text"],"cost":{"input":0,"output":0,"cacheRead":0,"cacheWrite":0},"contextWindow":131072,"maxTokens":4096}]}}},"agents":{"defaults":{"model":{"primary":"nim/%s"},"models":{"nim/%s":{}}}},"mcp":{"servers":{"weka-app-store-mcp":{"url":"http://localhost:%s/mcp","transport":"streamable-http","skill":"%s"}}}}\n' "$NIM_BASE_URL" "$NIM_MODEL" "$NIM_MODEL" "$NIM_MODEL" "$MCP_PORT" "$SKILL_MD_PATH" > /home/node/.openclaw/openclaw.json && cat /home/node/.openclaw/openclaw.json
          env:
            - name: MCP_PORT
              value: "8080"
            - name: SKILL_MD_PATH
              value: "/home/node/.openclaw/SKILL.md"
            - name: NIM_BASE_URL
              value: "http://nim-llm.rag.svc.cluster.local:8000/v1"
            - name: NIM_MODEL
              value: "meta/llama-3.1-8b-instruct"
          volumeMounts:
            - name: openclaw-config
              mountPath: /home/node/.openclaw
          # runAsUser 1000 matches fsGroup so the written openclaw.json
          # is readable by both OpenClaw (uid 1000) and the MCP sidecar (uid 10001, gid 1000 via fsGroup)
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        # ─── Container 1: OpenClaw Gateway ──────────────────────────────────────
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          command:
            - "node"
            - "dist/index.js"
            - "gateway"
            - "--bind=lan"
            - "--port"
            - "18789"
            - "--allow-unconfigured"
            - "--verbose"
          ports:
            - containerPort: 18789
              name: gateway
              protocol: TCP
            - containerPort: 18790
              name: secondary
              protocol: TCP
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-token
                  key: token
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nvidia-api-key
                  key: key
            # Local NIM LLM — OpenAI-compatible endpoint in-cluster
            - name: OPENAI_API_BASE
              value: "http://nim-llm.rag.svc.cluster.local:8000/v1"
            - name: OPENAI_API_KEY
              value: "not-needed"
            - name: OPENCLAW_MODEL
              value: "meta/llama-3.1-8b-instruct"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: openclaw-config
              mountPath: /home/node/.openclaw
            - name: openclaw-workspace
              mountPath: /home/node/.openclaw/workspace
            # NCLAW-04: SKILL.md from ConfigMap gives OpenClaw agent context about
            # available MCP tools. Mounted read-only via subPath so it appears as a
            # single file inside the already-mounted openclaw-config emptyDir path.
            - name: skill-md
              mountPath: /home/node/.openclaw/SKILL.md
              subPath: SKILL.md
              readOnly: true
        # ─── Container 2: WEKA App Store MCP Sidecar ────────────────────────────
        # K8S-03: Readiness probe gates traffic routing until the MCP HTTP server
        # is accepting connections. OpenClaw will not route tool calls until Ready.
        - name: weka-mcp-sidecar
          image: wekachrisjen/weka-app-store-mcp
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: mcp-http
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_PORT
              value: "8080"
            # K8S-04: BLUEPRINTS_DIR points into the git-sync worktree's manifests
            # subdirectory. git-sync creates /blueprints/blueprints -> .worktrees/<hash>
            # which is a symlink. Kubernetes subPath does not follow symlinks so the
            # sidecar mounts the full emptyDir at /app/git-sync-root and navigates
            # through the symlink to the manifests/ subdirectory at runtime via BLUEPRINTS_DIR.
            - name: BLUEPRINTS_DIR
              value: "/app/git-sync-root/blueprints/manifests"
            - name: KUBERNETES_AUTH_MODE
              value: "incluster"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # git-sync writes to /blueprints/blueprints (a symlink -> .worktrees/<hash>).
            # Kubernetes subPath does NOT follow symlinks, so using subPath: blueprints
            # results in an empty mount (the symlink is never dereferenced).
            # Fix: mount the full emptyDir at /app/git-sync-root. The MCP server then
            # reads /app/git-sync-root/blueprints/manifests/ which Python's os.listdir()
            # follows through the symlink at runtime (unlike Kubernetes subPath).
            # BLUEPRINTS_DIR env var is set to this full path above.
            - name: blueprints
              mountPath: /app/git-sync-root
            # openclaw-config is readOnly here — the init container already wrote
            # openclaw.json; the sidecar only needs to read SKILL.md from this volume.
            # Write happens exclusively in the init container to avoid race conditions.
            - name: openclaw-config
              mountPath: /home/node/.openclaw
              readOnly: true
        # ─── Container 3: git-sync ───────────────────────────────────────────────
        # Continuously syncs the warp-blueprints repo into the blueprints emptyDir.
        # --one-time flag is intentionally absent: continuous sync is the locked decision
        # so blueprints remain current without pod restarts.
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.5.0
          args:
            - --repo=https://github.com/weka/warp-blueprints.git
            - --root=/blueprints
            - --link=blueprints
            - --period=60s
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65533
          volumeMounts:
            - name: blueprints
              mountPath: /blueprints
      volumes:
        # Shared config dir: init container writes openclaw.json here;
        # OpenClaw and MCP sidecar read from it.
        - name: openclaw-config
          emptyDir: {}
        # Shared blueprint store: git-sync writes here; MCP sidecar reads via subPath mount.
        - name: blueprints
          emptyDir: {}
        # SKILL.md ConfigMap: provides agent context for OpenClaw tool discovery.
        # Created by: kubectl apply -f k8s/agent-sandbox/mcp-skill-configmap.yaml -n <NAMESPACE>
        - name: skill-md
          configMap:
            name: weka-mcp-skill-md
  volumeClaimTemplates:
    - metadata:
        name: openclaw-workspace
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
