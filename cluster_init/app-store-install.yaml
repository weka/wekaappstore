x-variables:
  operator_version:
    default: v1.13.0
    description: "WEKA operator Helm chart version (e.g. v1.13.0)"
  weka_image_version:
    required: true
    description: "WEKA-in-container image tag (e.g. 5.1.0.605)"
  join_ip_ports:
    required: true
    description: "Comma-delimited host:port list for WEKA cluster join (e.g. 192.168.1.1:14000,192.168.1.2:14000)"
    # NOTE: join_ip_ports is the user-provided comma-delimited string.
    # The Phase 29 backend derives join_ip_ports_list (YAML-array form, e.g.
    # ["192.168.1.1:14000","192.168.1.2:14000"]) and endpoints_csv from this
    # value before the Jinja2 render pass. The template uses join_ip_ports_list
    # for WekaClient joinIpPorts and endpoints_csv for the CSI API secret.
  weka_endpoint_scheme:
    default: http
    description: "HTTP scheme for WEKA API endpoint (http or https)"
  weka_org:
    default: Root
    description: "WEKA organization name"
  weka_username:
    required: true
    description: "WEKA cluster username"
  weka_password:
    required: true
    description: "WEKA cluster password"
  quay_dockerconfigjson:
    required: true
    validate: false
    description: "GUI-built dockerconfigjson string for quay.io pull secret (injected by server)"

# Per-blueprint SSE deploy timeout (seconds).  The full operator+CSI+WekaClient install
# runs ~5 sequential stages each with a 300s readinessCheck, so the legacy 900s cap
# would false-fail a healthy install.  45 minutes provides comfortable headroom for
# a cold-cache image pull + cluster join (D-08).
x-deploy-timeout: 2700
---
apiVersion: warp.io/v1alpha1
kind: WekaAppStore
metadata:
  name: app-store-install
  namespace: default
spec:
  appStack:
    components:

      # -----------------------------------------------------------------------
      # STAGE 1: Quay pull secrets (parallel, no dependencies)
      # Two components: one per namespace that needs quay.io image pulls.
      # -----------------------------------------------------------------------

      - name: quay-secret-operator-ns
        description: "Quay.io pull secret in weka-operator-system namespace"
        enabled: true
        dependsOn: []
        targetNamespace: weka-operator-system
        kubernetesManifest: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: quay-io-secret
            namespace: weka-operator-system
          type: kubernetes.io/dockerconfigjson
          stringData:
            .dockerconfigjson: '[[ quay_dockerconfigjson ]]'

      - name: quay-secret-default-ns
        description: "Quay.io pull secret in default namespace (WekaClient image pull)"
        enabled: true
        dependsOn: []
        targetNamespace: default
        kubernetesManifest: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: quay-io-secret
            namespace: default
          type: kubernetes.io/dockerconfigjson
          stringData:
            .dockerconfigjson: '[[ quay_dockerconfigjson ]]'

      # -----------------------------------------------------------------------
      # STAGE 2: WEKA Operator (depends on both quay secrets)
      # Installed from OCI registry. readinessCheck waits for operator deployment
      # to be available before proceeding with CRD-dependent components.
      # -----------------------------------------------------------------------

      - name: weka-operator
        description: "WEKA Kubernetes operator — installs WekaClient CRD and manages WEKA cluster lifecycle"
        enabled: true
        dependsOn:
          - quay-secret-operator-ns
          - quay-secret-default-ns
        helmChart:
          # OCI chart: operator assembles oci://quay.io/weka.io/helm/weka-operator at install time
          repository: "oci://quay.io/weka.io/helm"
          name: "weka-operator"
          releaseName: "weka-operator"
          version: "[[ operator_version ]]"
        waitForReady: true
        readinessCheck:
          type: deployment
          name: weka-operator-controller-manager
          namespace: weka-operator-system
          timeout: 300
        targetNamespace: weka-operator-system

      # -----------------------------------------------------------------------
      # STAGE 2b: WekaClient CRD (depends on weka-operator)
      # weka-operator v1.13.0 from the OCI registry does not ship this CRD.
      # Apply it explicitly and wait for it to be established before the
      # WekaClient CR in STAGE 4 is applied.
      # -----------------------------------------------------------------------

      - name: weka-client-crd
        description: "WekaClient CRD — required before the WekaClient CR can be applied"
        enabled: true
        dependsOn:
          - weka-operator
        waitForReady: true
        readinessCheck:
          type: crd
          name: wekaclients.weka.weka.io
          timeout: 60
        kubernetesManifest: |
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            annotations:
              controller-gen.kubebuilder.io/version: v0.16.5
            name: wekaclients.weka.weka.io
          spec:
            group: weka.weka.io
            names:
              kind: WekaClient
              listKind: WekaClientList
              plural: wekaclients
              singular: wekaclient
            scope: Namespaced
            versions:
            - additionalPrinterColumns:
              - description: Resource status
                jsonPath: .status.status
                name: Status
                type: string
              - description: Name of the target cluster if exists
                jsonPath: .spec.targetCluster.name
                name: Target Cluster
                type: string
              - description: Number of cores
                jsonPath: .spec.coresNum
                name: Cores
                type: integer
              - description: 'Number of client containers: Active/Created/Desired'
                jsonPath: .status.printer.containers
                name: Containers(A/C/D)
                type: string
              name: v1alpha1
              schema:
                openAPIV3Schema:
                  description: WekaClient is the Schema for the clients API
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    metadata:
                      type: object
                    spec:
                      description: WekaClientSpec defines the desired state of WekaClient
                      properties:
                        additionalMemory:
                          type: integer
                        agentPort:
                          type: integer
                        allowHotUpgrade:
                          type: boolean
                        autoRemoveTimeout:
                          default: 24h
                          pattern: ^(0|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+)$
                          type: string
                        coreIds:
                          items:
                            type: integer
                          type: array
                        coresNum:
                          type: integer
                        cpuPolicy:
                          default: auto
                          enum:
                          - auto
                          - shared
                          - dedicated
                          - dedicated_ht
                          - manual
                          type: string
                        cpuRequest:
                          type: string
                        csiConfig:
                          properties:
                            advanced:
                              properties:
                                controllerLabels:
                                  additionalProperties:
                                    type: string
                                  type: object
                                controllerTolerations:
                                  items:
                                    properties:
                                      effect:
                                        type: string
                                      key:
                                        type: string
                                      operator:
                                        type: string
                                      tolerationSeconds:
                                        format: int64
                                        type: integer
                                      value:
                                        type: string
                                    type: object
                                  type: array
                                enforceTrustedHttps:
                                  type: boolean
                                nodeLabels:
                                  additionalProperties:
                                    type: string
                                  type: object
                                nodeTolerations:
                                  items:
                                    properties:
                                      effect:
                                        type: string
                                      key:
                                        type: string
                                      operator:
                                        type: string
                                      tolerationSeconds:
                                        format: int64
                                        type: integer
                                      value:
                                        type: string
                                    type: object
                                  type: array
                                skipGarbageCollection:
                                  type: boolean
                              type: object
                            csiGroup:
                              type: string
                            disableControllerCreation:
                              type: boolean
                          type: object
                        driversDistService:
                          type: string
                        globalPVC:
                          properties:
                            name:
                              type: string
                            path:
                              type: string
                          required:
                          - name
                          type: object
                        hugepages:
                          type: integer
                        hugepagesOffset:
                          type: integer
                        image:
                          pattern: ^.+:\d+\.\d+\.\d+.*$
                          type: string
                        imagePullSecret:
                          type: string
                        joinIpPorts:
                          items:
                            type: string
                          type: array
                        network:
                          properties:
                            bindManagementAll:
                              type: boolean
                            deviceSubnets:
                              items:
                                pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                                type: string
                              type: array
                            ethDevice:
                              type: string
                            ethDevices:
                              items:
                                type: string
                              type: array
                            gateway:
                              type: string
                            managementIpsSelectors:
                              items:
                                properties:
                                  deviceNames:
                                    items:
                                      type: string
                                    type: array
                                  max:
                                    type: integer
                                  min:
                                    type: integer
                                  subnet:
                                    type: string
                                type: object
                              type: array
                            nvidiaVfSingleIp:
                              type: boolean
                            selectors:
                              items:
                                properties:
                                  deviceNames:
                                    items:
                                      type: string
                                    type: array
                                  max:
                                    type: integer
                                  min:
                                    type: integer
                                  subnet:
                                    type: string
                                type: object
                              type: array
                            udpMode:
                              type: boolean
                          type: object
                        nodeSelector:
                          additionalProperties:
                            type: string
                          type: object
                        overrides:
                          properties:
                            driversBuildId:
                              type: string
                            driversLoaderImage:
                              type: string
                            dropAffinityConstraints:
                              type: boolean
                            forceDrain:
                              type: boolean
                            machineIdentifierNodeRef:
                              type: string
                            skipActiveMountsCheck:
                              type: boolean
                            umountOnHost:
                              type: boolean
                            wekaContainerName:
                              type: string
                          type: object
                        port:
                          type: integer
                        portRange:
                          properties:
                            basePort:
                              default: 45000
                              maximum: 65535
                              type: integer
                            portRange:
                              default: 0
                              type: integer
                          required:
                          - basePort
                          type: object
                        rawTolerations:
                          items:
                            properties:
                              effect:
                                type: string
                              key:
                                type: string
                              operator:
                                type: string
                              tolerationSeconds:
                                format: int64
                                type: integer
                              value:
                                type: string
                            type: object
                          type: array
                        resources:
                          properties:
                            limits:
                              properties:
                                cpu:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                memory:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                              type: object
                            requests:
                              properties:
                                cpu:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                memory:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                              type: object
                          type: object
                        serviceAccountName:
                          type: string
                        targetCluster:
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                          required:
                          - name
                          - namespace
                          type: object
                        tolerations:
                          items:
                            type: string
                          type: array
                        tracesConfiguration:
                          properties:
                            dumperConfigMode:
                              default: auto
                              enum:
                              - override
                              - partial-override
                              - auto
                              - cluster
                              type: string
                            ensureFreeSpace:
                              default: 20
                              type: integer
                            maxCapacityPerIoNode:
                              default: 10
                              type: integer
                          type: object
                        upgradePolicy:
                          properties:
                            type:
                              default: all-at-once
                              enum:
                              - manual
                              - all-at-once
                              - rolling
                              - all-at-once-force
                              type: string
                          type: object
                        wekaHome:
                          properties:
                            cacertSecret:
                              type: string
                          type: object
                        wekaHomeConfig:
                          properties:
                            cacertSecret:
                              type: string
                          type: object
                        wekaSecretRef:
                          type: string
                      required:
                      - image
                      type: object
                    status:
                      description: WekaClientStatus defines the observed state of WekaClient
                      properties:
                        conditions:
                          items:
                            properties:
                              lastTransitionTime:
                                format: date-time
                                type: string
                              message:
                                maxLength: 32768
                                type: string
                              observedGeneration:
                                format: int64
                                minimum: 0
                                type: integer
                              reason:
                                maxLength: 1024
                                minLength: 1
                                pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                                type: string
                              status:
                                enum:
                                - "True"
                                - "False"
                                - Unknown
                                type: string
                              type:
                                maxLength: 316
                                pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                                type: string
                            required:
                            - lastTransitionTime
                            - message
                            - reason
                            - status
                            - type
                            type: object
                          type: array
                        lastAppliedSpec:
                          type: string
                        printer:
                          properties:
                            containers:
                              type: string
                          type: object
                        stats:
                          properties:
                            containers:
                              properties:
                                active:
                                  format: int64
                                  type: integer
                                created:
                                  format: int64
                                  type: integer
                                desired:
                                  format: int64
                                  type: integer
                              type: object
                          type: object
                        status:
                          default: Init
                          enum:
                          - Init
                          - Running
                          - Upgrading
                          - Destroying
                          type: string
                      type: object
                  type: object
              served: true
              storage: true
              subresources:
                status: {}

      # -----------------------------------------------------------------------
      # STAGE 3: CSI driver (depends on weka-operator for CRD readiness)
      # Public Helm repo — no auth needed.
      # Pin to 2.8.7 (latest stable as of Phase 27); update this when upgrading.
      # -----------------------------------------------------------------------

      - name: csi-wekafs
        description: "WEKA CSI driver (csi-wekafsplugin) — provides StorageClass provisioning"
        enabled: true
        dependsOn:
          - weka-operator
        helmChart:
          repository: "https://weka.github.io/csi-wekafs"
          name: "csi-wekafsplugin"
          releaseName: "csi-wekafs"
          version: "2.8.7"  # pin; update when upgrading CSI driver
        waitForReady: true
        readinessCheck:
          type: deployment
          name: csi-wekafs-controller
          namespace: csi-wekafs
          timeout: 300
        targetNamespace: csi-wekafs

      # -----------------------------------------------------------------------
      # STAGE 3 (parallel): Node-label service account
      # SA must exist before the ClusterRoleBinding references it.
      # -----------------------------------------------------------------------

      - name: weka-node-label-sa
        description: "ServiceAccount for the node-label Job that marks worker nodes"
        enabled: true
        dependsOn:
          - weka-operator
        targetNamespace: kube-system
        kubernetesManifest: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: weka-node-label
            namespace: kube-system

      # -----------------------------------------------------------------------
      # STAGE 3 (parallel): WekaClient secret
      # Plain Opaque secret with stringData — no base64 hand-encoding required.
      # -----------------------------------------------------------------------

      - name: weka-client-secret
        description: "WEKA cluster credentials secret consumed by the WekaClient CR"
        enabled: true
        dependsOn:
          - weka-operator
        targetNamespace: default
        kubernetesManifest: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: weka-client-cluster-dev
            namespace: default
          type: Opaque
          stringData:
            org: "[[ weka_org ]]"
            username: "[[ weka_username ]]"
            password: "[[ weka_password ]]"

      # -----------------------------------------------------------------------
      # STAGE 4: Node-label RBAC (depends on SA)
      # Binds cluster-admin to the node-label SA — consistent with the
      # gateway-api-crds precedent in app-store-cluster-init.yaml.
      # Tradeoff: cluster-admin is broad; least-privilege follow-on deferred.
      # -----------------------------------------------------------------------

      - name: weka-node-label-rbac
        description: "ClusterRoleBinding granting cluster-admin to the node-label SA"
        enabled: true
        dependsOn:
          - weka-node-label-sa
        kubernetesManifest: |
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: weka-node-label-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: weka-node-label
              namespace: kube-system

      # -----------------------------------------------------------------------
      # STAGE 5: Node-label Job (depends on RBAC)
      # Labels all worker nodes with weka.io/supports-clients=true so the
      # WekaClient nodeSelector can schedule pods there. --overwrite makes
      # re-runs idempotent (SEC-02).
      # -----------------------------------------------------------------------

      - name: weka-node-label-job
        description: "Job that labels all nodes with weka.io/supports-clients=true"
        enabled: true
        dependsOn:
          - weka-node-label-rbac
        waitForReady: true
        readinessCheck:
          type: job
          name: weka-node-label
          namespace: kube-system
          timeout: 300
        targetNamespace: kube-system
        kubernetesManifest: |
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: weka-node-label
          spec:
            backoffLimit: 2
            template:
              spec:
                serviceAccountName: weka-node-label
                restartPolicy: OnFailure
                containers:
                  - name: kubectl
                    image: registry.k8s.io/kubectl:v1.31.0
                    command: ["kubectl", "label", "nodes", "--all", "weka.io/supports-clients=true", "--overwrite"]

      # -----------------------------------------------------------------------
      # STAGE 4 (parallel): CSI API secret (depends on csi-wekafs namespace)
      # endpoints_csv is a server-derived var (comma-joined host:port list)
      # injected by Phase 29 backend — NOT in x-variables.
      # -----------------------------------------------------------------------

      - name: csi-api-secret
        description: "CSI API secret — WEKA cluster credentials for csi-wekafsplugin provisioner"
        enabled: true
        dependsOn:
          - csi-wekafs
        targetNamespace: csi-wekafs
        kubernetesManifest: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: csi-wekafs-api-secret
            namespace: csi-wekafs
          type: Opaque
          stringData:
            username: "[[ weka_username ]]"
            password: "[[ weka_password ]]"
            organization: "[[ weka_org ]]"
            endpoints: "[[ endpoints_csv ]]"
            scheme: "[[ weka_endpoint_scheme ]]"

      # -----------------------------------------------------------------------
      # STAGE 4 (parallel): WekaClient CR (depends on operator + secret)
      # NO readinessCheck — WekaClient operator manages its own reconcile loop;
      # the operator cannot meaningfully wait on client-cluster-join completion.
      # join_ip_ports_list is a YAML-array injected by Phase 29 backend.
      # NOTE: weka-client runs in parallel with weka-node-label-job by design
      # (D-01/D-03). The WekaClient operator manages its own reconcile loop and
      # will schedule pods on labeled nodes when labels arrive. Adding
      # weka-node-label-job to dependsOn would contradict the locked D-01/D-03.
      # -----------------------------------------------------------------------

      - name: weka-client
        description: "WekaClient CR — deploys WEKA client DaemonSet on labeled nodes"
        enabled: true
        dependsOn:
          - weka-client-crd
          - weka-client-secret
        targetNamespace: default
        kubernetesManifest: |
          apiVersion: weka.weka.io/v1alpha1
          kind: WekaClient
          metadata:
            name: warp-cluster-clients
          spec:
            image: quay.io/weka.io/weka-in-container:[[ weka_image_version ]]
            imagePullSecret: quay-io-secret
            driversDistService: "https://drivers.weka.io"
            port: 4500
            agentPort: 45000
            nodeSelector:
              weka.io/supports-clients: "true"
            wekaSecretRef: weka-client-cluster-dev
            joinIpPorts: [[ join_ip_ports_list ]]

      # -----------------------------------------------------------------------
      # STAGE 5: StorageClass demote Job (depends on csi-api-secret)
      # Patches any existing default StorageClass to is-default-class=false
      # before the new WEKA default StorageClass is applied. Idempotent (SEC-02).
      # Uses a dedicated least-privilege ClusterRole (get/list/patch storageclasses)
      # — NOT cluster-admin (T-27-04 mitigation).
      # -----------------------------------------------------------------------

      - name: storageclass-demote-job
        description: "SA + ClusterRole + ClusterRoleBinding + Job: demotes any existing default StorageClass before WEKA classes are applied"
        enabled: true
        dependsOn:
          - csi-api-secret
        waitForReady: true
        readinessCheck:
          type: job
          name: storageclass-demote
          namespace: kube-system
          timeout: 300
        targetNamespace: kube-system
        kubernetesManifest: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: storageclass-demote
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: storageclass-demote-role
          rules:
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: storageclass-demote-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: storageclass-demote-role
          subjects:
            - kind: ServiceAccount
              name: storageclass-demote
              namespace: kube-system
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: storageclass-demote
          spec:
            backoffLimit: 2
            template:
              spec:
                serviceAccountName: storageclass-demote
                restartPolicy: OnFailure
                containers:
                  - name: kubectl
                    image: registry.k8s.io/kubectl:v1.31.0
                    command: ["kubectl", "annotate", "storageclass", "--all", "storageclass.kubernetes.io/is-default-class=false", "--overwrite"]

      # -----------------------------------------------------------------------
      # STAGE 6: StorageClasses (depends on demote Job)
      # Three StorageClasses in one manifest block:
      #   1. storageclass-wekafs-dir-api — DELETE policy, is-default-class=true
      #   2. storageclass-wekafs-dir-api-retain — RETAIN policy, not default
      #   3. storageclass-wekafs-fs-api — filesystem-backed, RETAIN, not default
      # All reference csi-wekafs-api-secret in csi-wekafs namespace.
      # -----------------------------------------------------------------------

      - name: storageclasses
        description: "Three WEKA StorageClasses: dir-api (default), dir-api-retain, fs-api"
        enabled: true
        dependsOn:
          - storageclass-demote-job
        kubernetesManifest: |
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: storageclass-wekafs-dir-api
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
          provisioner: csi.weka.io
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
          allowVolumeExpansion: true
          parameters:
            volumeType: dir/v1
            filesystemName: csi-dir
            capacityEnforcement: HARD
            ownerUid: "1000"
            ownerGid: "1000"
            permissions: "0775"
            csi.storage.k8s.io/provisioner-secret-name: csi-wekafs-api-secret
