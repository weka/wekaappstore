<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to WEKA App Store</title>
  {% if logo_b64 %}
    <link rel="icon" type="image/png" href="data:image/png;base64,{{ logo_b64 }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js" crossorigin></script>
  <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js" crossorigin></script>
  <script src="https://unpkg.com/@mui/material@5.15.14/umd/material-ui.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root { --weka-purple: #6b2fb3; --weka-purple-dark: #552695; --weka-dark: #0B0C10; }
    body { background: #0b0c10; color: #e5e7eb; font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Apple Color Emoji', 'Segoe UI Emoji'; }
    .brand-grad { background: linear-gradient(135deg, #0b0c10 0%, #111827 40%, #0b0c10 100%); }
    .card { background: rgba(31, 41, 55, 0.55); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(8px); }
    .log-container { background-color: #111827; color: #d1d5db; font-family: 'Courier New', Courier, monospace; height: 300px; overflow-y: auto; padding: 12px; border-radius: 8px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }
    .log-entry { margin-bottom: 2px; border-left: 2px solid transparent; padding-left: 8px; white-space: pre-wrap; word-break: break-all; }
    .log-info { border-left-color: #6b2fb3; }
    .log-success { border-left-color: #10b981; color: #10b981; }
    .log-error { border-left-color: #ef4444; color: #ef4444; }
    .log-warn { border-left-color: #f59e0b; color: #fbbf24; }
    .bg-orb { position: absolute; filter: blur(80px); opacity: 0.3; pointer-events: none; }
    .orb-purple { background: radial-gradient(closest-side, rgba(107,47,179,0.5), transparent 70%); }
    .orb-blue { background: radial-gradient(closest-side, rgba(59,130,246,0.2), transparent 70%); }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const {
      ThemeProvider, createTheme, CssBaseline, Button, LinearProgress,
      Typography, Box, Container, Paper, List, ListItem, ListItemText,
      ListItemIcon, Divider, Alert, AlertTitle, Chip, FormControl,
      InputLabel, Select, MenuItem,
      Stepper, Step, StepLabel, TextField, Checkbox, FormControlLabel
    } = MaterialUI;

    const theme = createTheme({
      palette: {
        mode: 'dark',
        primary: { main: '#6b2fb3' },
        background: { default: '#0b0c10', paper: 'rgba(31, 41, 55, 0.7)' },
      },
      typography: {
        fontFamily: "'Inter', sans-serif",
      },
      components: {
        MuiCssBaseline: {
          styleOverrides: {
            body: {
              scrollbarWidth: 'thin',
              '&::-webkit-scrollbar': {
                width: '6px',
              },
              '&::-webkit-scrollbar-track': {
                background: '#0b0c10',
              },
              '&::-webkit-scrollbar-thumb': {
                background: '#374151',
                borderRadius: '10px',
              },
              '&::-webkit-scrollbar-thumb:hover': {
                background: '#4b5563',
              },
            },
          },
        },
      },
    });

    function StatusIndicator({ label, status }) {
      return (
        <Box sx={% raw %}{{ display: 'flex', alignItems: 'center', gap: 1.5 }}{% endraw %}>
          <Box sx={% raw %}{{
            width: 10,
            height: 10,
            borderRadius: '50%',
            bgcolor: status === true ? '#10b981' : status === false ? '#ef4444' : '#6b7280',
            boxShadow: status === true ? '0 0 8px #10b981' : status === false ? '0 0 8px #ef4444' : 'none',
            flexShrink: 0
          }}{% endraw %} />
          <Typography variant="body2" sx={% raw %}{{ color: 'rgba(255,255,255,0.8)', fontWeight: 500, fontSize: '0.85rem' }}{% endraw %}>
            {label}: {status === true ? 'Installed' : status === false ? 'Not Installed' : 'Checking...'}
          </Typography>
        </Box>
      );
    }

    const STEP_LABELS = ["Node Prerequisites", "Quay Credentials", "WEKA Connection", "WEKA Credentials", "Review"];

    const NODE_PREREQ_SNIPPET = `# KubeletConfiguration — apply on all worker nodes
# Add to /etc/kubernetes/kubelet-config.yaml and restart kubelet.
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cpuManagerPolicy: static
cpuManagerPolicyOptions:
  strict-cpu-reservation: "true"
kubeReserved:
  cpu: "1000m"
  memory: "1Gi"
reservedSystemCPUs: "0-1"
# Hugepages for WEKA client (25000 x 2Mi)
---
apiVersion: v1
kind: Node
# kubectl patch node <node-name> --type=json \\
#   -p='[{"op":"add","path":"/status/allocatable/hugepages-2Mi","value":"50Gi"}]'
# Or configure in kubelet:
# kubeReserved:
#   hugepages-2Mi: 0
# featureGates:
#   HugePageStorageMediumSize: true`;

    function WelcomeApp() {
      const [initializing, setInitializing] = React.useState(false);
      const [phase, setPhase] = React.useState('None');
      const [statusMessage, setStatusMessage] = React.useState('');
      const [logs, setLogs] = React.useState([]);
      const [clusterName, setClusterName] = React.useState('Detecting...');
      const [wekaOperatorInstalled, setWekaOperatorInstalled] = React.useState(null);
      const [wekaCsiInstalled, setWekaCsiInstalled] = React.useState(null);
      const [errorCount, setErrorCount] = React.useState(0);
      const [failed, setFailed] = React.useState(false);
      const [showProgress, setShowProgress] = React.useState(false);
      const [progressActive, setProgressActive] = React.useState(false);
      const [namespaces, setNamespaces] = React.useState(['default']);
      const [selectedNamespace, setSelectedNamespace] = React.useState('default');
      const logContainerRef = React.useRef(null);

      // Install progress state (30-03)
      const [stages, setStages] = React.useState([]);
      const [installError, setInstallError] = React.useState(null);

      // Wizard state
      const [activeStep, setActiveStep] = React.useState(0);
      const [nodePrereqAck, setNodePrereqAck] = React.useState(false);
      const [form, setForm] = React.useState({
        quay_username: "",
        quay_password: "",
        operator_version: "v1.13.0",
        join_ip_ports: "",
        weka_image_version: "",
        weka_endpoint_scheme: "http",
        weka_org: "Root",
        weka_username: "",
        weka_password: "",
      });
      const [fieldErrors, setFieldErrors] = React.useState({});

      React.useEffect(() => {
        // Fetch cluster info
        fetch('/cluster-info')
          .then(res => res.json())
          .then(data => {
            setClusterName(data.cluster_name);
            setWekaOperatorInstalled(data.weka_operator_installed);
            setWekaCsiInstalled(data.weka_csi_installed);
          })
          .catch(err => {
            setClusterName('Kubernetes Cluster');
            setWekaOperatorInstalled(false);
            setWekaCsiInstalled(false);
          });

        // Fetch namespaces
        fetch('/api/namespaces')
          .then(res => res.json())
          .then(data => {
            if (data.ok && data.items) {
              setNamespaces(data.items);
              // Try to restore from localStorage or auth-status
              const saved = localStorage.getItem('selectedNamespace');
              if (saved && data.items.includes(saved)) {
                setSelectedNamespace(saved);
              } else {
                fetch('/auth-status')
                  .then(res => res.json())
                  .then(auth => {
                    if (auth.authenticated && auth.details?.namespace) {
                      if (data.items.includes(auth.details.namespace)) {
                        setSelectedNamespace(auth.details.namespace);
                      }
                    }
                  }).catch(() => {});
              }
            }
          })
          .catch(err => console.error('Failed to fetch namespaces:', err));

        // Check initial status
        fetch(`/cluster-status?namespace=${selectedNamespace}`)
          .then(res => res.json())
          .then(status => {
            if (status.exists) {
              setPhase(status.phase);
              setStatusMessage(status.message);
              // If it's already in progress, completed or failed, show the progress box
              if (status.phase !== 'None' && status.phase !== 'Pending') {
                setShowProgress(true);
              }
              if (status.phase === 'Failed') {
                setFailed(true);
              }
            }
          });
      }, []);

      React.useEffect(() => {
        if (initializing && !failed) {
          const interval = setInterval(async () => {
            try {
              const response = await fetch(`/cluster-status?namespace=${selectedNamespace}`);
              const status = await response.json();

              if (status.exists) {
                setPhase(status.phase);
                setStatusMessage(status.message || 'Initializing components...');

                if (status.phase === 'Ready') {
                  setInitializing(false);
                  clearInterval(interval);
                  // Auto redirect after 2 seconds
                  const targetUrl = status.redirect_url || '/';
                  setTimeout(() => { window.location.href = targetUrl; }, 2000);
                } else if (status.phase === 'Failed' || status.phase === 'Error') {
                  setFailed(true);
                  setInitializing(false);
                  clearInterval(interval);
                } else {
                  // If it's something else (Installing, etc.), reset error count
                  setErrorCount(0);
                }
              } else if (status.error) {
                  setStatusMessage(`Error: ${status.error}`);
                  throw new Error(status.error);
              }
            } catch (err) {
              console.error('Status poll error:', err);
              setErrorCount(prev => {
                const next = prev + 1;
                if (next >= 5) {
                  setFailed(true);
                  setInitializing(false);
                  clearInterval(interval);
                }
                return next;
              });
            }
          }, 3000);
          return () => clearInterval(interval);
        }
      }, [initializing, failed, selectedNamespace]);

      React.useEffect(() => {
        if (logContainerRef.current) {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [logs]);

      React.useEffect(() => {
        let eventSource;
        if (initializing && !failed) {
          eventSource = new EventSource('/init-logs');
          eventSource.onmessage = (event) => {
            const data = event.data;
            let type = 'info';
            if (data.toLowerCase().includes('failed') || data.toLowerCase().includes('error')) {
              type = 'error';
              if (data.includes('Operator pod not found after 5 attempts')) {
                setFailed(true);
                setInitializing(false);
              }
            }
            else if (data.toLowerCase().includes('ready') || data.toLowerCase().includes('success')) type = 'success';
            else if (data.toLowerCase().includes('warning')) type = 'warn';

            setLogs(prev => [...prev, { text: data, type }]);
          };
          eventSource.onerror = () => {
            // Browser handles reconnection automatically
          };
        }
        return () => {
          if (eventSource) eventSource.close();
        };
      }, [initializing, failed]);

      // Build the variables dict for /deploy-stream (D-08)
      function buildVariables() {
        return {
          quay_username: form.quay_username.trim(),
          quay_password: form.quay_password,
          operator_version: form.operator_version.trim(),
          join_ip_ports: form.join_ip_ports.trim(),
          weka_image_version: form.weka_image_version.trim(),
          weka_endpoint_scheme: form.weka_endpoint_scheme,
          weka_org: form.weka_org.trim(),
          weka_username: form.weka_username.trim(),
          weka_password: form.weka_password,
          namespace: selectedNamespace,
        };
      }

      // Map an operator component phase to a MUI sx color (D-06, mirrors blueprint.html sectionClass)
      function stageColor(phase) {
        switch ((phase || '').toLowerCase()) {
          case 'ready':
          case 'healthy':    return { border: '1px solid rgba(16,185,129,0.6)', bgcolor: 'rgba(16,185,129,0.1)', color: '#6ee7b7' };
          case 'failed':
          case 'error':      return { border: '1px solid rgba(239,68,68,0.6)', bgcolor: 'rgba(239,68,68,0.1)', color: '#fca5a5' };
          case 'installing':
          case 'upgrading':  return { border: '1px solid rgba(251,191,36,0.8)', bgcolor: 'rgba(234,179,8,0.1)', color: '#fde68a' };
          default:           return { border: '1px solid rgba(255,255,255,0.1)', bgcolor: 'rgba(31,41,55,0.4)', color: 'rgba(255,255,255,0.5)' };
        }
      }

      // Validate the fields on a given step index (D-04)
      function validateStep(stepIndex) {
        const errors = {};
        const versionRe = /^v?\d+\.\d+(\.\d+)*$/;
        const hostPortRe = /^[^:]+:\d+$/;

        if (stepIndex === 1) {
          if (!form.quay_username.trim()) errors.quay_username = "Quay username is required";
          if (!form.quay_password) errors.quay_password = "Quay password is required";
          if (!form.operator_version.trim()) {
            errors.operator_version = "Operator version is required";
          } else if (!versionRe.test(form.operator_version.trim())) {
            errors.operator_version = "Use a version like v1.13.0 or 1.13.0";
          }
        }

        if (stepIndex === 2) {
          if (!form.join_ip_ports.trim()) {
            errors.join_ip_ports = "At least one endpoint is required";
          } else {
            const entries = form.join_ip_ports.split(',').map(e => e.trim()).filter(e => e);
            const invalid = entries.filter(e => !hostPortRe.test(e));
            if (invalid.length > 0) {
              errors.join_ip_ports = "Each endpoint must be host:port (e.g. 192.168.1.1:14000)";
            }
          }
          if (!form.weka_image_version.trim()) {
            errors.weka_image_version = "WEKA image version is required";
          } else if (!versionRe.test(form.weka_image_version.trim())) {
            errors.weka_image_version = "Use a version like v5.1.0.605 or 5.1.0.605";
          }
        }

        if (stepIndex === 3) {
          if (!form.weka_username.trim()) errors.weka_username = "WEKA username is required";
          if (!form.weka_password) errors.weka_password = "WEKA password is required";
        }

        return errors;
      }

      // Named handleInstall entry point — opens app-store-install SSE stream (D-05, PROG-01)
      function handleInstall() {
        // Re-validate all steps before installing
        const errs1 = validateStep(1);
        const errs2 = validateStep(2);
        const errs3 = validateStep(3);
        const allErrors = { ...errs1, ...errs2, ...errs3 };
        if (Object.keys(allErrors).length > 0) {
          setFieldErrors(allErrors);
          return;
        }

        setShowProgress(true);
        setProgressActive(true);
        setInstallError(null);
        setStages([]);

        const vars = buildVariables();
        const params = new URLSearchParams({
          app_name: 'app-store-install',
          variables: JSON.stringify(vars),
        });
        const es = new EventSource(`/deploy-stream?${params.toString()}`);

        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'init') {
              // Seed the stage list from the init items (PROG-01)
              setStages((msg.items || []).map(name => ({ name, phase: 'pending', message: '' })));
            } else if (msg.type === 'component') {
              // Update the matching stage, or append if not in list (mirrors blueprint.html:315-321)
              const phaseVal = (msg.phase || 'pending').toLowerCase();
              setStages(prev => {
                const idx = prev.findIndex(s => s.name === msg.name);
                if (idx >= 0) {
                  const next = [...prev];
                  next[idx] = { ...next[idx], phase: phaseVal, message: msg.message || '' };
                  return next;
                }
                return [...prev, { name: msg.name, phase: phaseVal, message: msg.message || '' }];
              });
            } else if (msg.type === 'complete') {
              es.close();
              if (msg.ok !== false) {
                // Genuine Ready (post 30-01 fix) — mark all stages ready, then chain cluster-init (D-10)
                setStages(prev => prev.map(s => ({ ...s, phase: 'ready' })));
                openClusterInitStream();
              } else {
                // Genuine Failed (post 30-01 fix) — show error + Retry (PROG-03, D-07)
                setInstallError(msg.message || 'Installation failed.');
              }
            } else if (msg.type === 'error') {
              // Hard fail — show error + Retry (PROG-03, D-07)
              setInstallError(msg.message || 'An unexpected error occurred.');
              es.close();
            }
          } catch (err) {
            console.error('SSE parse error:', err);
          }
        };

        es.onerror = () => {
          setInstallError('Connection to deployment stream lost. Check the server and retry.');
          setProgressActive(false);
          es.close();
        };
      }

      // Cluster-init chain — opened automatically after app-store-install Ready (D-10)
      function openClusterInitStream() {
        const params = new URLSearchParams({
          app_name: 'cluster-init',
          variables: JSON.stringify({ namespace: selectedNamespace }),
        });
        const es = new EventSource(`/deploy-stream?${params.toString()}`);

        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'init') {
              // Append cluster-init stages to the existing list (single unified stage list)
              setStages(prev => [
                ...prev,
                ...(msg.items || []).map(name => ({ name, phase: 'pending', message: '' })),
              ]);
            } else if (msg.type === 'component') {
              // Same component handler — tolerate both multi-component and single-stage cases
              const phaseVal = (msg.phase || 'pending').toLowerCase();
              setStages(prev => {
                const idx = prev.findIndex(s => s.name === msg.name);
                if (idx >= 0) {
                  const next = [...prev];
                  next[idx] = { ...next[idx], phase: phaseVal, message: msg.message || '' };
                  return next;
                }
                return [...prev, { name: msg.name, phase: phaseVal, message: msg.message || '' }];
              });
            } else if (msg.type === 'complete') {
              es.close();
              if (msg.ok !== false) {
                // Genuine Ready (post 30-01 fix) — fetch redirect_url and navigate (D-11)
                setStages(prev => prev.map(s => ({ ...s, phase: 'ready' })));
                fetch(`/cluster-status?namespace=${selectedNamespace}`)
                  .then(res => res.json())
                  .then(data => {
                    window.location.href = data.redirect_url || '/';
                  })
                  .catch(() => {
                    window.location.href = '/';
                  });
              } else {
                // cluster-init Failed — show error + Retry (Retry re-runs handleInstall; both CRs are idempotent)
                setInstallError(msg.message || 'Cluster initialization failed.');
              }
            } else if (msg.type === 'error') {
              setInstallError(msg.message || 'Cluster initialization error.');
              es.close();
            }
          } catch (err) {
            console.error('SSE parse error:', err);
          }
        };

        es.onerror = () => {
          setInstallError('Connection to cluster-init stream lost. Check the server and retry.');
          es.close();
        };
      }

      const handleInitialize = async () => {
        setInitializing(true);
        setShowProgress(true);
        setFailed(false);
        setErrorCount(0);
        setLogs([]);

        // Use deploy-stream for consistency with other blueprints
        const params = new URLSearchParams({
          app_name: 'cluster-init',
          variables: JSON.stringify({ namespace: selectedNamespace }),
        });
        const url = `/deploy-stream?${params.toString()}`;
        const es = new EventSource(url);

        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'init') {
              setLogs(prev => [...prev, { text: `Applying initialization manifest: ${msg.items?.length || 0} components identified.`, type: 'info' }]);
            } else if (msg.type === 'progress') {
              setLogs(prev => [...prev, { text: `Applying ${msg.name}...`, type: 'info' }]);
              setStatusMessage(`Applying ${msg.name}...`);
            } else if (msg.type === 'complete') {
              setLogs(prev => [...prev, { text: "Manifest applied successfully. Waiting for operator to initialize components...", type: 'success' }]);
              setStatusMessage("Waiting for operator...");
              es.close();
            } else if (msg.type === 'error') {
              setLogs(prev => [...prev, { text: `Deployment Error: ${msg.message}`, type: 'error' }]);
              setInitializing(false);
              setFailed(true);
              es.close();
            }
          } catch (err) {
            console.error('SSE parse error:', err);
          }
        };

        es.onerror = (err) => {
          console.error('SSE connection error:', err);
          es.close();
        };
      };

      function handleFormChange(key, value) {
        setForm(prev => ({ ...prev, [key]: value }));
        // Clear error for the field on change
        if (fieldErrors[key]) {
          setFieldErrors(prev => {
            const next = { ...prev };
            delete next[key];
            return next;
          });
        }
      }

      function handleNext() {
        if (activeStep === 0) {
          // Step 1: gated by nodePrereqAck (button disabled when false)
          setActiveStep(prev => prev + 1);
          return;
        }
        const errors = validateStep(activeStep);
        if (Object.keys(errors).length > 0) {
          setFieldErrors(errors);
          return;
        }
        setFieldErrors({});
        setActiveStep(prev => prev + 1);
      }

      function handleBack() {
        setActiveStep(prev => prev - 1);
      }

      function renderStepContent(step) {
        if (step === 0) {
          return (
            <Box>
              <Typography variant="body2" sx={% raw %}{{ mb: 2, color: 'rgba(255,255,255,0.7)' }}{% endraw %}>
                Before installing WEKA, apply the following configuration on all worker nodes that will run WEKA clients. This is required for CPU manager and hugepage support.
              </Typography>
              <Box
                component="pre"
                sx={% raw %}{{
                  bgcolor: '#111827',
                  border: '1px solid rgba(255,255,255,0.1)',
                  borderRadius: '8px',
                  p: 2,
                  fontSize: '0.75rem',
                  color: '#d1d5db',
                  overflowX: 'auto',
                  whiteSpace: 'pre-wrap',
                  wordBreak: 'break-all',
                  mb: 2,
                  fontFamily: "'Courier New', Courier, monospace",
                }}{% endraw %}
              >
                {NODE_PREREQ_SNIPPET}
              </Box>
              <FormControlLabel
                control={
                  <Checkbox
                    checked={nodePrereqAck}
                    onChange={(e) => setNodePrereqAck(e.target.checked)}
                    sx={% raw %}{{ color: 'rgba(255,255,255,0.5)', '&.Mui-checked': { color: '#6b2fb3' } }}{% endraw %}
                  />
                }
                label={
                  <Typography variant="body2" sx={% raw %}{{ color: 'rgba(255,255,255,0.8)' }}{% endraw %}>
                    I have applied node prerequisites on all worker nodes
                  </Typography>
                }
              />
            </Box>
          );
        }

        if (step === 1) {
          return (
            <Box sx={% raw %}{{ display: 'flex', flexDirection: 'column', gap: 2 }}{% endraw %}>
              <TextField
                label="Quay Username"
                variant="outlined"
                size="small"
                fullWidth
                value={form.quay_username}
                onChange={(e) => handleFormChange('quay_username', e.target.value)}
                error={!!fieldErrors.quay_username}
                helperText={fieldErrors.quay_username || ''}
              />
              <TextField
                label="Quay Password / Robot Token"
                variant="outlined"
                size="small"
                fullWidth
                type="password"
                value={form.quay_password}
                onChange={(e) => handleFormChange('quay_password', e.target.value)}
                error={!!fieldErrors.quay_password}
                helperText={fieldErrors.quay_password || ''}
              />
              <TextField
                label="Operator Version"
                variant="outlined"
                size="small"
                fullWidth
                value={form.operator_version}
                onChange={(e) => handleFormChange('operator_version', e.target.value)}
                error={!!fieldErrors.operator_version}
                helperText={fieldErrors.operator_version || 'e.g. v1.13.0'}
              />
            </Box>
          );
        }

        if (step === 2) {
          return (
            <Box sx={% raw %}{{ display: 'flex', flexDirection: 'column', gap: 2 }}{% endraw %}>
              <TextField
                label="WEKA Endpoints (join_ip_ports)"
                variant="outlined"
                size="small"
                fullWidth
                value={form.join_ip_ports}
                onChange={(e) => handleFormChange('join_ip_ports', e.target.value)}
                error={!!fieldErrors.join_ip_ports}
                helperText={fieldErrors.join_ip_ports || 'Comma-delimited host:port list, e.g. 192.168.1.1:14000,192.168.1.2:14000'}
              />
              <TextField
                label="WEKA Image Version"
                variant="outlined"
                size="small"
                fullWidth
                value={form.weka_image_version}
                onChange={(e) => handleFormChange('weka_image_version', e.target.value)}
                error={!!fieldErrors.weka_image_version}
                helperText={fieldErrors.weka_image_version || 'e.g. 5.1.0.605'}
              />
              <FormControl size="small" fullWidth variant="outlined">
                <InputLabel id="scheme-label">API Scheme</InputLabel>
                <Select
                  labelId="scheme-label"
                  value={form.weka_endpoint_scheme}
                  label="API Scheme"
                  onChange={(e) => handleFormChange('weka_endpoint_scheme', e.target.value)}
                >
                  <MenuItem value="http">http</MenuItem>
                  <MenuItem value="https">https</MenuItem>
                </Select>
              </FormControl>
            </Box>
          );
        }

        if (step === 3) {
          return (
            <Box sx={% raw %}{{ display: 'flex', flexDirection: 'column', gap: 2 }}{% endraw %}>
              <TextField
                label="WEKA Organization"
                variant="outlined"
                size="small"
                fullWidth
                value={form.weka_org}
                onChange={(e) => handleFormChange('weka_org', e.target.value)}
                error={!!fieldErrors.weka_org}
                helperText={fieldErrors.weka_org || 'Default: Root'}
              />
              <TextField
                label="WEKA Username"
                variant="outlined"
                size="small"
                fullWidth
                value={form.weka_username}
                onChange={(e) => handleFormChange('weka_username', e.target.value)}
                error={!!fieldErrors.weka_username}
                helperText={fieldErrors.weka_username || ''}
              />
              <TextField
                label="WEKA Password"
                variant="outlined"
                size="small"
                fullWidth
                type="password"
                value={form.weka_password}
                onChange={(e) => handleFormChange('weka_password', e.target.value)}
                error={!!fieldErrors.weka_password}
                helperText={fieldErrors.weka_password || ''}
              />
            </Box>
          );
        }

        // Step 4: Review
        if (step === 4) {
          const reviewRows = [
            { label: "Quay Username", value: form.quay_username },
            { label: "Quay Password", value: "••••••••" },
            { label: "Operator Version", value: form.operator_version },
            { label: "WEKA Endpoints", value: form.join_ip_ports },
            { label: "WEKA Image Version", value: form.weka_image_version },
            { label: "API Scheme", value: form.weka_endpoint_scheme },
            { label: "WEKA Organization", value: form.weka_org },
            { label: "WEKA Username", value: form.weka_username },
            { label: "WEKA Password", value: "••••••••" },
          ];
          return (
            <Box sx={% raw %}{{ display: 'flex', flexDirection: 'column', gap: 2 }}{% endraw %}>
              <Typography variant="body2" sx={% raw %}{{ color: 'rgba(255,255,255,0.6)' }}{% endraw %}>
                Review your settings before installing. Passwords are masked.
              </Typography>
              <Box sx={% raw %}{{ bgcolor: 'rgba(255,255,255,0.03)', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.08)', p: 2 }}{% endraw %}>
                {reviewRows.map((row) => (
                  <Box key={row.label} sx={% raw %}{{ display: 'flex', justifyContent: 'space-between', py: 0.5 }}{% endraw %}>
                    <Typography variant="caption" sx={% raw %}{{ color: 'rgba(255,255,255,0.5)', fontWeight: 600, minWidth: 160 }}{% endraw %}>{row.label}</Typography>
                    <Typography variant="caption" sx={% raw %}{{ color: 'rgba(255,255,255,0.85)', wordBreak: 'break-all', textAlign: 'right' }}{% endraw %}>{row.value || <em style={% raw %}{{ opacity: 0.4 }}{% endraw %}>not set</em>}</Typography>
                  </Box>
                ))}
              </Box>

              <FormControl size="small" sx={% raw %}{{ minWidth: 200 }}{% endraw %}>
                <InputLabel id="review-namespace-label">Namespace</InputLabel>
                <Select
                  labelId="review-namespace-label"
                  value={selectedNamespace}
                  label="Namespace"
                  onChange={(e) => {
                    setSelectedNamespace(e.target.value);
                    localStorage.setItem('selectedNamespace', e.target.value);
                  }}
                >
                  {namespaces.map((ns) => (
                    <MenuItem key={ns} value={ns}>{ns}</MenuItem>
                  ))}
                </Select>
              </FormControl>
            </Box>
          );
        }

        return null;
      }

      return (
        <ThemeProvider theme={theme}>
          <CssBaseline />
          <Box className="brand-grad min-h-screen relative flex flex-col">
            <div className="bg-orb orb-purple w-[420px] h-[420px] rounded-full" style={% raw %}{{top:'-120px', left:'-120px', zIndex: 0}}{% endraw %}></div>
            <div className="bg-orb orb-blue w-[520px] h-[520px] rounded-full" style={% raw %}{{bottom:'-160px', right:'-160px', zIndex: 0}}{% endraw %}></div>

            <header className="fixed top-0 left-0 right-0 z-50 brand-grad border-b border-white/10 px-6 py-6 flex items-center gap-3">
              { '{{ logo_b64 }}' !== '' && (
                <img src={`data:image/png;base64,${'{{ logo_b64 }}'}`} alt="WEKA App Store" className="w-8 h-8 rounded-sm object-contain" />
              )}
              <Typography variant="h5" component="h1" sx={% raw %}{{ fontWeight: 600, tracking: 'tight' }}{% endraw %}>
                WEKA App Store
              </Typography>
            </header>

            <Container maxWidth="lg" sx={% raw %}{{ pt: 20, pb: 8, flexGrow: 1, position: 'relative', zIndex: 1 }}{% endraw %}>
              <Box className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                {/* Left column: wizard (hidden when progressActive) */}
                <Box className="lg:col-span-7 space-y-6">
                  <Typography variant="h3" sx={% raw %}{{ fontWeight: 600, lineHeight: 1.2 }}{% endraw %}>
                    Initializing the <span className="bg-clip-text text-transparent" style={% raw %}{{backgroundImage: 'linear-gradient(90deg, var(--weka-purple) 0%, #a855f7 50%, #60a5fa 100%)'}}{% endraw %}>WEKA App Store</span>
                  </Typography>

                  <Typography variant="body1" sx={% raw %}{{ color: '#fff', fontWeight: 500, opacity: 0.9 }}{% endraw %}>
                    Welcome to the WEKA App Store, your marketplace for discovering and deploying AI use cases on Kubernetes. Complete the steps below to install the WEKA storage stack and initialize your cluster.
                  </Typography>

                  {!progressActive && (
                    <Box>
                      <Stepper activeStep={activeStep} sx={% raw %}{{ mb: 3 }}{% endraw %}>
                        {STEP_LABELS.map((label) => (
                          <Step key={label}>
                            <StepLabel>{label}</StepLabel>
                          </Step>
                        ))}
                      </Stepper>

                      <Paper className="card rounded-xl p-4 border-white/10" elevation={0} sx={% raw %}{{ mb: 3 }}{% endraw %}>
                        <Typography variant="subtitle1" sx={% raw %}{{ fontWeight: 600, mb: 2 }}{% endraw %}>
                          {STEP_LABELS[activeStep]}
                        </Typography>
                        {renderStepContent(activeStep)}
                      </Paper>

                      <Box sx={% raw %}{{ display: 'flex', justifyContent: 'space-between', gap: 2 }}{% endraw %}>
                        <Button
                          variant="outlined"
                          onClick={handleBack}
                          disabled={activeStep === 0}
                          sx={% raw %}{{ textTransform: 'none', borderColor: 'rgba(255,255,255,0.2)', color: 'rgba(255,255,255,0.7)' }}{% endraw %}
                        >
                          Back
                        </Button>

                        {activeStep < STEP_LABELS.length - 1 ? (
                          <Button
                            variant="contained"
                            onClick={handleNext}
                            disabled={activeStep === 0 && !nodePrereqAck}
                            sx={% raw %}{{
                              bgcolor: 'var(--weka-purple)',
                              textTransform: 'none',
                              fontWeight: 600,
                              '&:hover': { bgcolor: 'var(--weka-purple-dark)' },
                            }}{% endraw %}
                          >
                            Next
                          </Button>
                        ) : (
                          <Button
                            variant="contained"
                            onClick={handleInstall}
                            sx={% raw %}{{
                              bgcolor: 'var(--weka-purple)',
                              textTransform: 'none',
                              fontWeight: 600,
                              px: 4,
                              '&:hover': { bgcolor: 'var(--weka-purple-dark)' },
                            }}{% endraw %}
                          >
                            Install
                          </Button>
                        )}
                      </Box>
                    </Box>
                  )}

                  {progressActive && (
                    <Box sx={% raw %}{{ py: 2 }}{% endraw %}>
                      <Typography variant="h6" sx={% raw %}{{ fontWeight: 600, mb: 2 }}{% endraw %}>
                        {installError ? 'Installation Failed' : 'Installing WEKA Storage Stack...'}
                      </Typography>

                      {/* Per-stage install progress list (PROG-01, D-05, D-06) */}
                      {stages.length > 0 && (
                        <Box sx={% raw %}{{ display: 'flex', flexDirection: 'column', gap: 0.75, mb: 2 }}{% endraw %}>
                          {stages.map((stage, i) => (
                            <Box
                              key={stage.name + i}
                              title={stage.message || undefined}
                              sx={% raw %}{{ ...stageColor(stage.phase), px: 1.5, py: 0.75, borderRadius: '6px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}{% endraw %}
                            >
                              <Typography variant="caption" sx={% raw %}{{ fontWeight: 500, fontFamily: "'Courier New', monospace" }}{% endraw %}>
                                {stage.name}
                              </Typography>
                              <Typography variant="caption" sx={% raw %}{{ textTransform: 'capitalize', opacity: 0.85 }}{% endraw %}>
                                {stage.phase}
                              </Typography>
                            </Box>
                          ))}
                        </Box>
                      )}

                      {stages.length === 0 && !installError && (
                        <Box sx={% raw %}{{ mb: 2 }}{% endraw %}>
                          <LinearProgress sx={% raw %}{{ height: 6, borderRadius: 3, bgcolor: 'rgba(255,255,255,0.1)' }}{% endraw %} />
                          <Typography variant="body2" sx={% raw %}{{ color: 'rgba(255,255,255,0.5)', mt: 1 }}{% endraw %}>
                            Connecting to deployment stream...
                          </Typography>
                        </Box>
                      )}

                      {/* Inline failure display + Retry (PROG-03, D-07) */}
                      {installError && (
                        <Alert severity="error" variant="outlined" sx={% raw %}{{ mt: 1 }}{% endraw %}>
                          <AlertTitle>Error</AlertTitle>
                          {installError}
                          <Button
                            size="small"
                            color="inherit"
                            onClick={() => { setInstallError(null); handleInstall(); }}
                            sx={% raw %}{{ mt: 1, display: 'block', textTransform: 'none' }}{% endraw %}
                          >
                            Retry
                          </Button>
                        </Alert>
                      )}
                    </Box>
                  )}
                </Box>

                {/* Right column: status card */}
                <Box className="lg:col-span-5">
                  <Paper className="card rounded-xl p-6 border-white/10" elevation={0}>
                    <Box sx={% raw %}{{
                      mb: 2, p: 2,
                      borderRadius: '10px',
                      background: 'linear-gradient(180deg, rgba(107, 47, 179, 0.15) 0%, rgba(107, 47, 179, 0.05) 100%)',
                      border: '1px solid rgba(107, 47, 179, 0.3)',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      textAlign: 'center',
                      boxShadow: '0 4px 15px rgba(0,0,0,0.2)'
                    }}{% endraw %}>
                      <Typography variant="caption" sx={% raw %}{{ color: 'rgba(255,255,255,0.6)', textTransform: 'uppercase', fontWeight: 700, letterSpacing: '0.12em', mb: 0.5, fontSize: '0.7rem' }}{% endraw %}>
                        Target Cluster
                      </Typography>
                      <Typography variant="subtitle1" sx={% raw %}{{ color: '#fff', fontWeight: 600, wordBreak: 'break-all', fontSize: '1rem' }}{% endraw %}>
                        {clusterName}
                      </Typography>
                    </Box>

                    <Box sx={% raw %}{{
                      mb: 4, p: 2,
                      bgcolor: 'rgba(255,255,255,0.03)',
                      borderRadius: '8px',
                      border: '1px solid rgba(255,255,255,0.05)',
                      display: 'flex',
                      flexDirection: 'column',
                      gap: 1.5
                    }}{% endraw %}>
                      <StatusIndicator label="WEKA Operator" status={wekaOperatorInstalled} />
                      <StatusIndicator label="WEKA CSI Driver" status={wekaCsiInstalled} />
                    </Box>

                    {showProgress || (phase !== 'None' && phase !== 'Pending') ? (
                      <Box className="space-y-6">
                        <Box sx={% raw %}{{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}{% endraw %}>
                          <Typography variant="subtitle1" sx={% raw %}{{ fontWeight: 600 }}{% endraw %}>
                            {(phase === 'Ready') ? 'Initialization Complete' : (phase === 'Failed' || failed) ? 'Error' : 'Initializing...'}
                          </Typography>
                          <Typography variant="caption" sx={% raw %}{{ color: phase === 'Ready' ? '#10b981' : (phase === 'Failed' || failed) ? '#ef4444' : '#f59e0b' }}{% endraw %}>
                            {(phase === 'Failed' || failed) ? 'Failed' : phase}
                          </Typography>
                        </Box>

                        <LinearProgress
                          variant={(phase === 'Ready' || phase === 'Failed' || failed) ? 'determinate' : 'indeterminate'}
                          value={(phase === 'Ready' || phase === 'Failed' || failed) ? 100 : undefined}
                          sx={% raw %}{{
                            height: 8,
                            borderRadius: 4,
                            bgcolor: 'rgba(255,255,255,0.1)',
                            '& .MuiLinearProgress-bar': {
                              bgcolor: (phase === 'Failed' || failed) ? '#ef4444' : undefined
                            }
                          }}{% endraw %}
                        />

                        <Typography variant="body2" className="muted italic">
                          {statusMessage || 'Preparing environment...'}
                        </Typography>

                        <Box className="space-y-2">
                          <Typography variant="caption" className="muted uppercase font-bold tracking-wider">Operator Logs</Typography>
                          <Box className="log-container" ref={logContainerRef}>
                            {logs.map((log, i) => (
                              <div key={i} className={`log-entry log-${log.type}`}>{log.text}</div>
                            ))}
                          </Box>
                        </Box>

                        {phase === 'Ready' && (
                          <Alert severity="success" variant="filled" sx={% raw %}{{ mt: 2 }}{% endraw %}>
                            <AlertTitle>Success</AlertTitle>
                            Cluster initialized. Redirecting to App Store...
                          </Alert>
                        )}

                        {failed && (
                          <Alert severity="error" variant="filled" sx={% raw %}{{ mt: 2 }}{% endraw %}>
                            <AlertTitle>Initialization Failed</AlertTitle>
                            The process failed. Please check the logs and try again.
                            <Button size="small" color="inherit" onClick={() => { window.location.reload(); }} sx={% raw %}{{ mt: 1, display: 'block' }}{% endraw %}>Retry</Button>
                          </Alert>
                        )}
                      </Box>
                    ) : (
                      <Box sx={% raw %}{{ py: 4, textAlign: 'center' }}{% endraw %}>
                        <Typography className="muted" variant="body2">
                          Complete the wizard to begin the WEKA storage stack installation.
                        </Typography>
                      </Box>
                    )}
                  </Paper>
                </Box>
              </Box>
            </Container>
          </Box>
        </ThemeProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WelcomeApp />);
  </script>
</body>
</html>
